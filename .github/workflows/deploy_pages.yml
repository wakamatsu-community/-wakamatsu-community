name: Build and Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        env:
          GAS_WEB_APP_URL: ${{ secrets['GAS_WEB_APP_URL'] }}
        run: |
          if [ -z "${GAS_WEB_APP_URL}" ]; then
            echo "ERROR: GAS_WEB_APP_URL secret is missing or empty"
            exit 1
          fi

      - name: Preflight check GAS endpoint (GET/POST)
        env:
          GAS_WEB_APP_URL: ${{ secrets['GAS_WEB_APP_URL'] }}
        run: python scripts/check_gas_web_app.py

      - name: Build static files with injected runtime config
        env:
          GAS_WEB_APP_URL: ${{ secrets['GAS_WEB_APP_URL'] }}
          GOOGLE_CALENDAR_API_KEY: ${{ secrets['GOOGLE_CALENDAR_API_KEY'] }}
          GOOGLE_CALENDAR_ID: ${{ secrets['GOOGLE_CALENDAR_ID'] }}
          FIREBASE_API_KEY: ${{ secrets['FIREBASE_API_KEY'] }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets['FIREBASE_AUTH_DOMAIN'] }}
          FIREBASE_PROJECT_ID: ${{ secrets['FIREBASE_PROJECT_ID'] }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets['FIREBASE_STORAGE_BUCKET'] }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets['FIREBASE_MESSAGING_SENDER_ID'] }}
          FIREBASE_APP_ID: ${{ secrets['FIREBASE_APP_ID'] }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets['FIREBASE_MEASUREMENT_ID'] }}
        run: python scripts/build_pages.py --mode ci

      - name: Verify injected runtime config
        shell: bash
        run: |
          python - <<'PY'
          import json
          import re
          import sys
          from pathlib import Path

          path = Path("dist/js/runtime-config.js")
          if not path.exists():
              print("ERROR: dist/js/runtime-config.js not found")
              sys.exit(1)

          text = path.read_text(encoding="utf-8")
          m = re.search(r"window\.RUNTIME_CONFIG\s*=\s*(\{.*?\})\s*;", text, re.S)
          if not m:
              print("ERROR: window.RUNTIME_CONFIG block not found in dist/js/runtime-config.js")
              sys.exit(1)

          cfg = json.loads(m.group(1))
          gas = str(cfg.get("GAS_WEB_APP_URL", "")).strip()
          if not gas:
              print("ERROR: GAS_WEB_APP_URL was not injected into dist/js/runtime-config.js")
              sys.exit(1)

          print(f"OK: runtime config injected (GAS_WEB_APP_URL length={len(gas)})")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
