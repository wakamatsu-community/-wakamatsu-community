name: Build and Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        env:
          GAS_WEB_APP_URL: ${{ secrets['GAS_WEB_APP_URL'] }}
        run: |
          if [ -z "${GAS_WEB_APP_URL}" ]; then
            echo "ERROR: GAS_WEB_APP_URL secret is missing or empty"
            exit 1
          fi

      - name: Build static files with injected runtime config
        env:
          GAS_WEB_APP_URL: ${{ secrets['GAS_WEB_APP_URL'] }}
          GOOGLE_CALENDAR_API_KEY: ${{ secrets['GOOGLE_CALENDAR_API_KEY'] }}
          GOOGLE_CALENDAR_ID: ${{ secrets['GOOGLE_CALENDAR_ID'] }}
          FIREBASE_API_KEY: ${{ secrets['FIREBASE_API_KEY'] }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets['FIREBASE_AUTH_DOMAIN'] }}
          FIREBASE_PROJECT_ID: ${{ secrets['FIREBASE_PROJECT_ID'] }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets['FIREBASE_STORAGE_BUCKET'] }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets['FIREBASE_MESSAGING_SENDER_ID'] }}
          FIREBASE_APP_ID: ${{ secrets['FIREBASE_APP_ID'] }}
          FIREBASE_MEASUREMENT_ID: ${{ secrets['FIREBASE_MEASUREMENT_ID'] }}
        run: python scripts/build_pages.py --mode ci

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
